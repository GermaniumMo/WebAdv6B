<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <h1>DIGITAL SCHOOL CLOCK</h1>

        <h2 id="clock-display">00:00:00 AM</h2>
        <img id="timeImage" src="./images/ds_clock.png" alt="Digital School Clock">

        <h4>SET WAKE UP TIME</h4>
        <div class="selector-group">
            <select id="wakeUpTimeSelector"></select>
        </div>

        <h4>SET DIGITAL SCHOOL CLASS TIME</h4>
        <div class="selector-group">
            <select id="dsTimeSelector">
            </select>
        </div>

        <h4>SET SLEEP TIME</h4>
        <div class="selector-group">
            <select id="sleepTimeSelector"></select>
        </div>
        <br>
        <button id="saveButton">SAVE</button>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
